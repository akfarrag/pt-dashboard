<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Dashboard — My Clients</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --red: #8B0000;
    --red-dark: #700000;
    --red-deep: #580000;
    --bg: #f4f1ee;
    --surface: #ffffff;
    --border: #e5e0da;
    --text: #1a1a1a;
    --text-muted: #888;
    --text-light: #bbb;
    --green: #1a6e3c;
    --green-light: #e8f5ee;
    --amber: #b45309;
    --amber-light: #fef3c7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }

  /* TOP BAR */
  .topbar { background: var(--red); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 12px rgba(139,0,0,0.25); }
  .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.08em; color: #fff; }
  .topbar-logo span { opacity: 0.55; margin-right: 10px; }
  .topbar-right { font-size: 13px; color: rgba(255,255,255,0.6); }

  /* MAIN */
  .main { max-width: 960px; margin: 0 auto; padding: 48px 32px 80px; }

  /* PAGE HEADER */
  .page-header { margin-bottom: 40px; }
  .page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.05em; color: var(--red); line-height: 1; }
  .page-header p { font-size: 14px; color: var(--text-muted); margin-top: 6px; }

  /* STATS ROW */
  .stats-row { display: flex; gap: 16px; margin-bottom: 40px; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 18px 24px; flex: 1; border: 1px solid var(--border); }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--red); letter-spacing: 0.03em; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* CLIENT GRID */
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin-bottom: 16px; }
  .client-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }

  /* CLIENT CARD */
  .client-wrap { position: relative; }
  .client-btn { width: 100%; height: 72px; border-radius: 12px; background: var(--red); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0 16px; transition: background 0.15s, transform 0.1s, box-shadow 0.15s; box-shadow: 0 4px 12px rgba(139,0,0,0.3); }
  .client-btn:hover { background: var(--red-dark); box-shadow: 0 6px 20px rgba(139,0,0,0.4); transform: translateY(-1px); }
  .client-btn:active { background: var(--red-deep); transform: scale(0.97); }
  .client-btn-name { color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; text-align: center; line-height: 1.3; pointer-events: none; }

  /* ADD BUTTON */
  .add-btn { width: 100%; height: 72px; border-radius: 12px; background: transparent; border: 2px dashed var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); font-family: 'DM Sans', sans-serif; transition: border-color 0.15s, color 0.15s, background 0.15s; }
  .add-btn:hover { border-color: var(--red); color: var(--red); background: rgba(139,0,0,0.03); }

  /* DROPDOWN */
  .client-menu { display: none; flex-direction: column; position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.12); z-index: 100; overflow: hidden; animation: dropIn 0.15s ease; }
  .client-menu.open { display: flex; }
  @keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: none; border-bottom: 1px solid #f5f0eb; cursor: pointer; width: 100%; background: var(--surface); text-align: left; transition: background 0.1s; font-family: 'DM Sans', sans-serif; }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: #fdf5f2; }
  .menu-item-icon { font-size: 17px; flex-shrink: 0; width: 22px; text-align: center; }
  .menu-item-label { font-size: 13px; font-weight: 600; color: var(--text); display: block; }
  .menu-item-desc { font-size: 11px; color: var(--text-muted); display: block; }

  /* PANEL OVERLAY */
  .panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .panel-overlay.open { display: flex; }
  .panel { background: var(--surface); border-radius: 16px; width: 92%; max-width: 680px; max-height: 92vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: panelIn 0.2s ease; }
  @keyframes panelIn { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); border-radius: 16px 16px 0 0; z-index: 1; }
  .panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.06em; color: var(--red); }
  .panel-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .panel-close { background: #f5f0eb; border: none; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s; }
  .panel-close:hover { background: var(--red); color: #fff; }
  .panel-body { padding: 24px; }

  /* PANEL INTERNALS */
  .section-label-sm { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin: 20px 0 10px; }
  .section-label-sm:first-child { margin-top: 0; }
  .data-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f5f0eb; }
  .data-row:last-child { border-bottom: none; }
  .data-key { font-size: 12px; color: var(--text-muted); flex: 0 0 44%; }
  .data-val { font-size: 12px; font-weight: 600; color: var(--text); flex: 0 0 54%; text-align: right; }

  /* CHECK-IN NEW STYLES */
  .checkin-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .checkin-tab { flex: 1; padding: 10px 6px; background: #fafaf9; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-muted); text-align: center; transition: background 0.15s, color 0.15s; border-right: 1px solid var(--border); }
  .checkin-tab:last-child { border-right: none; }
  .checkin-tab.active { background: var(--red); color: #fff; }

  .checkin-panel { display: none; }
  .checkin-panel.active { display: block; }

  .checkin-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .checkin-field { display: flex; flex-direction: column; gap: 5px; }
  .checkin-field label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .checkin-field input, .checkin-field select, .checkin-field textarea { 
    font-size: 13px; border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; 
    color: var(--text); background: #fff; font-family: 'DM Sans', sans-serif; outline: none; 
    transition: border-color 0.15s; width: 100%;
  }
  .checkin-field input:focus, .checkin-field select:focus, .checkin-field textarea:focus { border-color: var(--red); }
  .checkin-field textarea { min-height: 70px; resize: vertical; line-height: 1.5; }

  .field-hint { font-size: 10px; color: var(--text-light); margin-top: 2px; }

  .divider-label { font-size: 11px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: 0.07em; margin: 18px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #f0dede; }

  /* TREND CHART AREA */
  .trend-section { margin-top: 24px; }
  .trend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
  .trend-card { background: #fafaf9; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .trend-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 10px; }
  .trend-canvas-wrap { position: relative; height: 120px; }

  /* DELTA BADGES */
  .delta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .delta-badge { display: flex; flex-direction: column; align-items: center; padding: 10px 14px; border-radius: 10px; font-size: 12px; }
  .delta-badge .d-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.03em; }
  .delta-badge .d-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; opacity: 0.75; }
  .delta-badge.down { background: var(--green-light); color: var(--green); }
  .delta-badge.up { background: #fef2f2; color: #b91c1c; }
  .delta-badge.neutral { background: #f5f0eb; color: var(--text-muted); }

  /* MACRO UPDATE SECTION */
  .macro-update-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
  .macro-update-item { display: flex; flex-direction: column; gap: 5px; }
  .macro-update-item label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .macro-update-item input { font-size: 13px; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); background: #fff; font-family: 'DM Sans', sans-serif; outline: none; width: 100%; text-align: center; transition: border-color 0.15s; }
  .macro-update-item input:focus { border-color: var(--red); }

  /* SUPPLEMENT & WORKOUT CARDS */
  .supp-card { background: #fdf9f9; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid #f0dede; }
  .supp-name { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 5px; }
  .supp-detail { font-size: 12px; color: #555; margin-bottom: 3px; line-height: 1.5; }
  .supp-link { display: inline-block; margin-top: 6px; font-size: 11px; color: var(--red); font-weight: 600; text-decoration: none; }
  .supp-link:hover { text-decoration: underline; }
  .workout-day { background: #fafaf9; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--border); }
  .workout-day-title { font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .exercise-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text); padding: 5px 0; border-bottom: 1px solid #f0ede8; }
  .exercise-row:last-child { border-bottom: none; }
  .exercise-sets { color: var(--text-muted); }
  .diet-tip { background: #fdf9f9; border-left: 3px solid var(--red); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 8px; font-size: 12px; color: #333; line-height: 1.6; }
  .macro-box { display: flex; justify-content: space-around; background: #fafaf9; border-radius: 10px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .macro-item { text-align: center; }
  .macro-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--red); letter-spacing: 0.03em; }
  .macro-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .notes-area { width: 100%; min-height: 140px; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--text); resize: vertical; font-family: 'DM Sans', sans-serif; line-height: 1.6; outline: none; transition: border-color 0.15s; }
  .notes-area:focus { border-color: var(--red); }
  .save-btn { display: block; width: 100%; margin-top: 16px; padding: 13px; background: var(--red); color: #fff; font-weight: 700; font-size: 13px; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .save-btn:hover { background: var(--red-dark); }
  .save-btn-secondary { background: #3b3b3b; }
  .save-btn-secondary:hover { background: #222; }
  .empty-state { font-size: 13px; color: var(--text-muted); padding: 16px 0; font-style: italic; }

  /* HISTORY TABLE */
  .history-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  .history-table th { background: #f5f0eb; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .history-table td { padding: 8px 10px; border-bottom: 1px solid #f5f0eb; vertical-align: middle; }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table .badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-red { background: #fef2f2; color: #b91c1c; }
  .badge-neutral { background: #f5f0eb; color: var(--text-muted); }

  /* EXPORT BTN */
  .export-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; background: #1a6e3c; color: #fff; font-weight: 700; font-size: 12px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Sans', sans-serif; transition: background 0.15s; margin-top: 12px; }
  .export-btn:hover { background: #155c32; }

  /* FOOTER */
  .footer { text-align: center; font-size: 12px; color: var(--text-light); margin-top: 60px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><span>PT</span>Dashboard</div>
  <div class="topbar-right" style="display:flex;align-items:center;gap:14px">
    <span id="sync-status" style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.75)">

    <div class="client-wrap">

        <button class="menu-item" onclick="openPanel('taha','checkin')"><span class="menu-item-icon">📈</span><div><span class="menu-item-label">Check-in data</span><span class="menu-item-desc">Progress, trends & macro updates</span></div></button>

        <button class="menu-item" onclick="openPanel('taha','diet')"><span class="menu-item-icon">🥗</span><div><span class="menu-item-label">Dietary guidelines</span><span class="menu-item-desc">Nutrition, macros & meal tips</span></div></button>
        <button class="menu-item" onclick="openPanel('taha','supplements')"><span class="menu-item-icon">💊</span><div><span class="menu-item-label">Supplements</span><span class="menu-item-desc">Protocol, brands & dosage</span></div></button>
        <button class="menu-item" onclick="openPanel('taha','notes')"><span class="menu-item-icon">📝</span><div><span class="menu-item-label">Comments & notes</span><span class="menu-item-desc">Trainer observations</span></div></button>

    <button class="add-btn" onclick="alert('To add a new client, return to Claude and type: I want to add a new client.')">＋ Add new client</button>

  <div class="footer">PT Dashboard · Built with Claude · All data stored locally in your browser</div>
</div>

// GOOGLE DRIVE SYNC LAYER
// ═══════════════════════════════════════════════════════════════════════════
// All DYNAMIC entered data (check-in values, dates, notes) lives here in DATA
// and syncs to a single JSON file in the trainer's Google Drive:
//   pt_dashboard_data.json
// Static program data (workouts, diet, supplements) stays in the CLIENTS
// object above in code, so future file updates never overwrite entered data.

const GOOGLE_CLIENT_ID = '458828637490-n86umk8emb67fst7t558qavj7pip3fap.apps.googleusercontent.com';
const DRIVE_FILE_NAME = 'pt_dashboard_data.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

let tokenClient = null;
let accessToken = null;
let driveFileId = null;
let driveReady = false;
let syncTimer = null;

// In-memory data store, mirrors what used to live in localStorage.
// Shape: { notes: {clientId: text}, dates: {"clientId-slotIdx": iso}, checkins: {"clientId-slotIdx-field": value} }
let DATA = { notes: {}, dates: {}, checkins: {} };

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  const btn = document.getElementById('drive-connect-btn');
  if (!dot || !txt) return;
  const colors = { offline: '#999', connecting: '#f5a623', synced: '#3ecf6e', error: '#e0524d' };
  dot.style.background = colors[state] || '#999';
  txt.textContent = text;
  if (btn) {
    if (state === 'synced' || state === 'connecting') btn.style.display = 'none';
    else btn.style.display = 'inline-block';
  }
}

// ─── INITIAL SIGN-IN ─────────────────────────────────────────────────────────
function connectDrive() {
  if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') {
    alert('Google Drive sync needs to be set up first.\n\nYou need to create a Google Cloud project and paste your Client ID into this file. Ask Claude for step-by-step instructions if you haven\'t done this yet.');
    return;
  }
  setSyncStatus('connecting', 'Connecting…');
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: async (resp) => {
      if (resp.error) { setSyncStatus('error', 'Connection failed'); return; }
      accessToken = resp.access_token;
      localStorage.setItem('pt-drive-token-cache', JSON.stringify({ token: accessToken, ts: Date.now() }));
      await initDriveFile();
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

// Try silent reconnect on page load if we have a recent token
async function tryAutoReconnect() {
  if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') {
    setSyncStatus('offline', 'Drive not set up');
    return;
  }
  setSyncStatus('connecting', 'Reconnecting…');
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: async (resp) => {
      if (resp.error) { setSyncStatus('offline', 'Not connected'); return; }
      accessToken = resp.access_token;
      await initDriveFile();
    }
  });
  // Silent attempt — no consent prompt. Falls back to needing a click if it fails.
  tokenClient.requestAccessToken({ prompt: '' });
}

// ─── FIND OR CREATE DATA FILE, THEN LOAD IT ──────────────────────────────────
async function initDriveFile() {
  try {
    setSyncStatus('connecting', 'Syncing…');
    const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
    const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const searchData = await searchRes.json();

    if (searchData.files && searchData.files.length > 0) {
      driveFileId = searchData.files[0].id;
      await loadFromDrive();
    } else {
      // Create new file with current (likely empty) DATA
      const metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', new Blob([JSON.stringify(DATA)], { type: 'application/json' }));
      const createRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}` },
        body: form
      });
      const createData = await createRes.json();
      driveFileId = createData.id;
    }
    driveReady = true;
    setSyncStatus('synced', 'Synced to Drive');
    refreshOpenPanel();
  } catch (err) {
    console.error('Drive init error', err);
    setSyncStatus('error', 'Sync error — retry');
  }
}

async function loadFromDrive() {
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  if (res.ok) {
    const remote = await res.json();
    DATA = Object.assign({ notes: {}, dates: {}, checkins: {} }, remote);
  }
}

// ─── DEBOUNCED SAVE TO DRIVE ──────────────────────────────────────────────────
function queueDriveSync() {
  if (!driveReady) return;
  setSyncStatus('connecting', 'Saving…');
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(DATA)
      });
      setSyncStatus('synced', 'Synced to Drive');
    } catch (err) {
      console.error('Drive save error', err);
      setSyncStatus('error', 'Save failed — retry');
    }
  }, 900);
}

function refreshOpenPanel() {
  // If a panel is currently open, re-render it so loaded Drive data shows up
  const overlay = document.getElementById('panel-overlay');
  if (overlay && overlay.classList.contains('open') && window._currentPanel) {
    openPanel(window._currentPanel.clientId, window._currentPanel.section);
  }
}

// ─── DATA ACCESSORS (replace old localStorage helpers, same call signatures) ─
function ciKey(clientId, slotIdx, field) { return `${clientId}-${slotIdx}-${field}`; }
function getCI(clientId, slotIdx, field) { return DATA.checkins[ciKey(clientId, slotIdx, field)] || ''; }
function setCI(clientId, slotIdx, field, val) { DATA.checkins[ciKey(clientId, slotIdx, field)] = val; queueDriveSync(); }

function dateKey(clientId, slotIdx) { return `${clientId}-${slotIdx}`; }
function getSlotDate(clientId, slotIdx) {
  const saved = DATA.dates[dateKey(clientId, slotIdx)];
  if (saved) return saved;
  return CLIENTS[clientId].checkinConfig.slots[slotIdx].isoDate || '';
}
function setSlotDate(clientId, slotIdx, val) {
  DATA.dates[dateKey(clientId, slotIdx)] = val;
  CLIENTS[clientId].checkinConfig.slots[slotIdx].isoDate = val;
  queueDriveSync();
}

function getNotes(clientId) { return DATA.notes[clientId] || ''; }
function setNotes(clientId, val) { DATA.notes[clientId] = val; queueDriveSync(); }

function formatDateNice(iso) {
  if (!iso) return 'TBC';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function formatDateShort(iso) {
  if (!iso) return 'TBC';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

  return `${tabs}${panels}${trendSection}${historySection}`;
}

function fieldInput(clientId, slotIdx, field, label, type, value, step, placeholder) {
  const id = ciKey(clientId, slotIdx, field);
  return `<div class="checkin-field">
    <label>${label}</label>
    <input type="${type}" id="${id}" value="${value}" step="${step}" placeholder="${placeholder}">
  </div>`;
}

function macroInput(clientId, slotIdx, phase, macro, label, value) {
  const id = ciKey(clientId, slotIdx, `macro_${phase}_${macro}`);
  return `<div class="macro-update-item">
    <label>${label}</label>
    <input type="number" id="${id}" value="${value}" placeholder="—">
  </div>`;
}

// ─── HISTORY TABLE ───────────────────────────────────────────────────────────
function buildHistoryTable(clientId, client) {
  const slots = client.checkinConfig.slots;
  let rows = '';
  slots.forEach((slot, i) => {
    const slotIso = getSlotDate(clientId, i);
    const dateDisplay = formatDateNice(slotIso);
    const w = i === 0 ? (client.checkinConfig.baselineWeight || '') : getCI(clientId, i, 'weight');
    const s = i === 0 ? (client.checkinConfig.baselineSteps || '') : getCI(clientId, i, 'steps');
    const water = i === 0 ? (client.checkinConfig.baselineWater || '') : getCI(clientId, i, 'water');
    const bf = i === 0 ? (client.checkinConfig.baselineBF || '') : getCI(clientId, i, 'bf');
    const kcalOff = i === 0 ? '2,030' : getCI(clientId, i, 'kcal_off');
    const kcalTr = i === 0 ? '2,100' : getCI(clientId, i, 'kcal_train');

    // Weight delta badge
    let wDelta = '', wBadge = 'neutral';
    if (i > 0 && w !== '' && client.checkinConfig.baselineWeight) {
      const prev = i === 1 ? client.checkinConfig.baselineWeight : (getCI(clientId, i-1, 'weight') || client.checkinConfig.baselineWeight);
      const diff = parseFloat(w) - parseFloat(prev);
      if (!isNaN(diff)) {
        wDelta = diff < 0 ? `▼ ${Math.abs(diff).toFixed(1)}` : diff > 0 ? `▲ ${diff.toFixed(1)}` : '—';
        wBadge = diff < 0 ? 'green' : diff > 0 ? 'red' : 'neutral';
      }
    }

    rows += `<tr>
      <td><strong>${slot.label}</strong><br><span style="font-size:10px;color:var(--text-muted)">${dateDisplay}</span></td>
      <td>${w ? w + ' kg' : '—'} ${wDelta ? `<span class="badge badge-${wBadge}">${wDelta}</span>` : ''}</td>
      <td>${bf ? bf + '%' : '—'}</td>
      <td>${s ? Number(s).toLocaleString() : '—'}</td>
      <td>${water ? water + 'L' : '—'}</td>
      <td>${kcalOff ? kcalOff + ' / ' + kcalTr : '—'}</td>
    </tr>`;
  });

  return `<div class="section-label-sm" style="margin-top:24px">Check-in History</div>
    <table class="history-table">
      <thead><tr>
        <th>Check-in</th><th>Weight</th><th>Body Fat</th><th>Steps</th><th>Water</th><th>Kcal Off/Train</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── SAVE CHECK-IN ───────────────────────────────────────────────────────────
function saveCheckinSlot(clientId, slotIdx) {
  const client = CLIENTS[clientId];
  const fields = ['weight','bf','steps','water','sleep','energy','feedback','trainer_notes','kcal_off','kcal_train',
    'macro_off_P','macro_off_F','macro_off_C','macro_off_kcal',
    'macro_tr_P','macro_tr_F','macro_tr_C','macro_tr_kcal'];
  fields.forEach(f => {
    const el = document.getElementById(ciKey(clientId, slotIdx, f));
    if (el) setCI(clientId, slotIdx, f, el.value);
  });
  // Refresh charts and table
  initCharts(clientId);
  const histDiv = document.querySelector(`#panel-body .history-table`)?.closest('.section-label-sm + *');
  // Re-render history
  const body = document.getElementById('panel-body');
  const sectionLabel = body.querySelector('.section-label-sm[style*="margin-top:24px"]');
  if (sectionLabel) {
    const tbl = sectionLabel.nextElementSibling;
    if (tbl) tbl.outerHTML = buildHistoryTable(clientId, client).replace(/.*?<table/, '<table').replace(/<\/table>.*/, '</table>');
  }
  updateDeltas(clientId);
  alert(`✅ ${client.checkinConfig.slots[slotIdx].label} check-in saved!`);
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
const _charts = {};

function initCharts(clientId) {
  const client = CLIENTS[clientId];
  const cfg = client.checkinConfig;
  const slots = cfg.slots;

  const labels = slots.map((s, i) => {
    const iso = getSlotDate(clientId, i);
    return iso ? formatDateShort(iso) : s.label;
  });

  function getVal(i, field, baseline) {
    if (i === 0) return parseFloat(baseline) || null;
    const v = getCI(clientId, i, field);
    return v ? parseFloat(v) : null;
  }

  const weights = slots.map((s, i) => getVal(i, 'weight', cfg.baselineWeight));
  const steps = slots.map((s, i) => getVal(i, 'steps', cfg.baselineSteps));
  const water = slots.map((s, i) => getVal(i, 'water', cfg.baselineWater));
  const kcalOff = slots.map((s, i) => {
    if (i === 0) return 2030;
    const v = getCI(clientId, i, 'kcal_off'); return v ? parseFloat(v) : null;
  });
  const kcalTr = slots.map((s, i) => {
    if (i === 0) return 2100;
    const v = getCI(clientId, i, 'kcal_train'); return v ? parseFloat(v) : null;
  });

  function makeChart(canvasId, datasets, yLabel) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    if (_charts[canvasId]) { _charts[canvasId].destroy(); }
    _charts[canvasId] = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: datasets.length > 1, labels: { font: { size: 10 }, boxWidth: 12 } } },
        scales: {
          x: { ticks: { font: { size: 10 } }, grid: { display: false } },
          y: { ticks: { font: { size: 10 } }, title: { display: false } }
        },
        elements: { point: { radius: 4, hoverRadius: 6 }, line: { tension: 0.3 } }
      }
    });
  }

  const RED = '#8B0000', RED_LIGHT = 'rgba(139,0,0,0.12)';
  const GREEN = '#1a6e3c', GREEN_LIGHT = 'rgba(26,110,60,0.12)';
  const BLUE = '#1e40af', BLUE_LIGHT = 'rgba(30,64,175,0.12)';

  makeChart(`chart-weight-${clientId}`, [{
    label: 'Weight (kg)', data: weights, borderColor: RED, backgroundColor: RED_LIGHT,
    fill: true, spanGaps: true
  }]);
  makeChart(`chart-steps-${clientId}`, [{
    label: 'Steps', data: steps, borderColor: GREEN, backgroundColor: GREEN_LIGHT,
    fill: true, spanGaps: true
  }]);
  makeChart(`chart-water-${clientId}`, [{
    label: 'Water (L)', data: water, borderColor: BLUE, backgroundColor: BLUE_LIGHT,
    fill: true, spanGaps: true
  }]);
  makeChart(`chart-kcal-${clientId}`, [
    { label: 'Off Days', data: kcalOff, borderColor: RED, backgroundColor: 'transparent', spanGaps: true },
    { label: 'Training', data: kcalTr, borderColor: GREEN, backgroundColor: 'transparent', spanGaps: true }
  ]);

  updateDeltas(clientId);
}

function updateDeltas(clientId) {
  const cfg = CLIENTS[clientId].checkinConfig;
  const container = document.getElementById(`deltas-${clientId}`);
  if (!container) return;

  // Find last two filled weight entries
  const slots = cfg.slots;
  let weights = slots.map((s, i) => {
    if (i === 0) return parseFloat(cfg.baselineWeight) || null;
    const v = getCI(clientId, i, 'weight'); return v ? parseFloat(v) : null;
  }).filter(v => v !== null);

  const lastWeight = weights[weights.length - 1];
  const firstWeight = weights[0];

  let html = '';
  if (firstWeight && lastWeight && weights.length > 1) {
    const totalDiff = (lastWeight - firstWeight).toFixed(1);
    const cls = totalDiff < 0 ? 'down' : totalDiff > 0 ? 'up' : 'neutral';
    const sign = totalDiff < 0 ? '▼' : totalDiff > 0 ? '▲' : '';
    html += `<div class="delta-badge ${cls}"><div class="d-val">${sign}${Math.abs(totalDiff)}</div><div class="d-lbl">kg total change</div></div>`;
    html += `<div class="delta-badge ${cls}"><div class="d-val">${lastWeight}</div><div class="d-lbl">current kg</div></div>`;
    if (firstWeight) {
      const target = 97;
      const remaining = (lastWeight - target).toFixed(1);
      html += `<div class="delta-badge neutral"><div class="d-val">${remaining > 0 ? remaining : 0}</div><div class="d-lbl">kg to target</div></div>`;
    }
  } else {
    html = `<div style="font-size:12px;color:var(--text-muted);font-style:italic;padding:8px 0">Enter check-in data to see trends & progress deltas.</div>`;
  }
  container.innerHTML = html;
}

// ─── UPDATE SLOT DATE ────────────────────────────────────────────────────────
function updateSlotDate(clientId, slotIdx, val) {
  setSlotDate(clientId, slotIdx, val);
  // Update nice label below picker
  const niceEl = document.getElementById(`date-nice-${clientId}-${slotIdx}`);
  if (niceEl) niceEl.textContent = formatDateNice(val);
  // Update tab label
  const tab = document.getElementById(`tab-${clientId}-${slotIdx}`);
  if (tab) {
    const span = tab.querySelector('span');
    if (span) span.textContent = formatDateShort(val);
  }
  // Refresh history table date column
  const body = document.getElementById('panel-body');
  if (body) {
    const sectionLabel = [...body.querySelectorAll('.section-label-sm')].find(el => el.textContent.includes('Check-in History'));
    if (sectionLabel) {
      const newHtml = buildHistoryTable(clientId, CLIENTS[clientId]);
      const wrapper = document.createElement('div');
      wrapper.innerHTML = newHtml;
      sectionLabel.replaceWith(...wrapper.childNodes);
    }
  }
}

function showCheckinTab(clientId, idx) {
  const client = CLIENTS[clientId];
  document.querySelectorAll(`[id^="tab-${clientId}-"]`).forEach(t => t.classList.remove('active'));
  document.querySelectorAll(`[id^="cipanel-${clientId}-"]`).forEach(p => p.classList.remove('active'));
  const tab = document.getElementById(`tab-${clientId}-${idx}`);
  const panel = document.getElementById(`cipanel-${clientId}-${idx}`);
  if (tab) tab.classList.add('active');
  if (panel) panel.classList.add('active');
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportCheckinCSV(clientId) {
  const client = CLIENTS[clientId];
  const cfg = client.checkinConfig;
  const headers = ['Check-in','Date','Weight (kg)','Body Fat %','Daily Steps','Water (L)','Sleep (hrs)','Energy (1-10)','Kcal Off','Kcal Train','Macro Off P','Macro Off F','Macro Off C','Macro Off Kcal','Macro Tr P','Macro Tr F','Macro Tr C','Macro Tr Kcal','Client Feedback','Trainer Notes'];
  const rows = cfg.slots.map((slot, i) => {
    const g = (f) => i === 0 ? '' : getCI(clientId, i, f);
    return [
      slot.label, formatDateNice(getSlotDate(clientId, i)),
      i === 0 ? (cfg.baselineWeight || '') : g('weight'),
      i === 0 ? (cfg.baselineBF || '') : g('bf'),
      i === 0 ? (cfg.baselineSteps || '') : g('steps'),
      i === 0 ? (cfg.baselineWater || '') : g('water'),
      g('sleep'), g('energy'),
      i === 0 ? '2030' : g('kcal_off'),
      i === 0 ? '2100' : g('kcal_train'),
      i === 0 ? '205' : g('macro_off_P'),
      i === 0 ? '90' : g('macro_off_F'),
      i === 0 ? '100' : g('macro_off_C'),
      i === 0 ? '2030' : g('macro_off_kcal'),
      i === 0 ? '206' : g('macro_tr_P'),
      i === 0 ? '95' : g('macro_tr_F'),
      i === 0 ? '105' : g('macro_tr_C'),
      i === 0 ? '2100' : g('macro_tr_kcal'),
      g('feedback'), g('trainer_notes')
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${client.name.replace(/\s+/g, '_')}_checkins.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── NOTES ───────────────────────────────────────────────────────────────────
function saveNotes(clientId) {
  const val = document.getElementById('notes-' + clientId).value;
  setNotes(clientId, val);
  alert('✅ Notes saved!');
}

  setSyncStatus('offline', 'Not connected');
  // Wait briefly for the Google script to load, then attempt silent reconnect
  setTimeout(() => {
    if (typeof google !== 'undefined' && google.accounts) {
      tryAutoReconnect();
    }
  }, 600);
});

function closePanel() { document.getElementById('panel-overlay').classList.remove('open'); }
function closePanelOutside(e) { if (e.target === document.getElementById('panel-overlay')) closePanel(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
